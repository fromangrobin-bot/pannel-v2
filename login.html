<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Espace — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1eb;--sur:#fff;--brd:#e8e3d9;--txt:#1a1814;--mut:#8a8278;--acc:#c8562a;--accl:#fdf0eb;--a2:#3d6b4f;--r:16px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:36px 32px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,.08);}

.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-family:'Fraunces',serif;font-size:26px;font-weight:300;letter-spacing:-.5px;}
.logo h1 em{font-style:italic;color:var(--acc);}
.logo p{font-size:12px;color:var(--mut);margin-top:4px;}

/* Onglets connexion / inscription */
.auth-tabs{display:flex;background:var(--bg);border:1px solid var(--brd);border-radius:var(--rs);padding:3px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--mut);font-weight:400;transition:all .15s;}
.auth-tab.active{background:var(--sur);color:var(--txt);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);}

.form{display:flex;flex-direction:column;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:12px;color:var(--mut);font-weight:500;}
.form-input{border:1px solid var(--brd);border-radius:var(--rs);padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:13px;background:#faf9f6;color:var(--txt);outline:none;transition:border-color .15s;width:100%;}
.form-input:focus{border-color:var(--acc);}

.btn-submit{padding:11px;border:none;border-radius:var(--rs);background:var(--acc);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;width:100%;margin-top:4px;}
.btn-submit:hover{background:#b04420;}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;}

.msg{padding:10px 13px;border-radius:var(--rs);font-size:13px;display:none;margin-bottom:4px;}
.msg.error{background:#fce4e4;color:#c0392b;border:1px solid #f5c6c6;}
.msg.success{background:var(--a2);color:#fff;border:1px solid var(--a2);}

.divider{text-align:center;font-size:11px;color:var(--mut);margin:4px 0;}

/* Password strength */
.pw-strength{height:3px;border-radius:10px;margin-top:5px;transition:all .3s;}
.pw-hint{font-size:10px;color:var(--mut);margin-top:3px;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Mon <em>Espace</em></h1>
    <p>Dashboard personnel · Accès sécurisé</p>
  </div>

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login')">Se connecter</button>
    <button class="auth-tab" onclick="switchTab('register')">Créer un compte</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- CONNEXION -->
  <div id="form-login" class="form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-input" id="login-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" class="form-input" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">Se connecter</button>
  </div>

  <!-- INSCRIPTION -->
  <div id="form-register" class="form" style="display:none">
    <div class="form-group">
      <label>Prénom (optionnel)</label>
      <input type="text" class="form-input" id="reg-name" placeholder="Ton prénom">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-input" id="reg-email" placeholder="ton@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" class="form-input" id="reg-password" placeholder="8 caractères minimum" autocomplete="new-password" oninput="checkPw(this.value)" onkeydown="if(event.key==='Enter')doRegister()">
      <div class="pw-strength" id="pw-bar" style="background:var(--brd);width:0%"></div>
      <div class="pw-hint" id="pw-hint"></div>
    </div>
    <button class="btn-submit" id="btn-register" onclick="doRegister()">Créer mon compte</button>
  </div>
</div>

<script>
// Si déjà connecté → rediriger vers le dashboard
const token = localStorage.getItem('auth_token');
if (token) {
  // Vérifier rapidement que le token est encore valide
  fetch('/api/data-sync', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => { if (r.ok) window.location.href = '/index.html'; })
    .catch(() => {});
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('form-login').style.display   = tab === 'login'    ? 'flex' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Chargement…' : (btnId === 'btn-login' ? 'Se connecter' : 'Créer mon compte');
}

// Indicateur de force du mot de passe
function checkPw(val) {
  const bar = document.getElementById('pw-bar');
  const hint = document.getElementById('pw-hint');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
  const labels = ['Très faible','Faible','Moyen','Fort','Très fort'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[Math.max(0, score - 1)];
  hint.textContent = val.length > 0 ? labels[Math.max(0, score - 1)] : '';
}

async function doLogin() {
  hideMsg();
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('Remplis tous les champs', 'error'); return; }

  setLoading('btn-login', true);
  try {
    const res = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Erreur', 'error'); return; }

    // Sauvegarder le token et les infos utilisateur
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user',  JSON.stringify(data.user));

    showMsg('Connexion réussie ! Redirection…', 'success');
    setTimeout(() => window.location.href = '/index.html', 800);
  } catch {
    showMsg('Erreur réseau. Réessaie.', 'error');
  } finally {
    setLoading('btn-login', false);
  }
}

async function doRegister() {
  hideMsg();
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!email || !password) { showMsg('Email et mot de passe requis', 'error'); return; }
  if (password.length < 8)  { showMsg('Mot de passe trop court (8 min)', 'error'); return; }

  setLoading('btn-register', true);
  try {
    const res = await fetch('/api/auth-register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name }),
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Erreur', 'error'); return; }

    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_user',  JSON.stringify(data.user));

    showMsg('Compte créé ! Redirection…', 'success');
    setTimeout(() => window.location.href = '/index.html', 800);
  } catch {
    showMsg('Erreur réseau. Réessaie.', 'error');
  } finally {
    setLoading('btn-register', false);
  }
}
</script>
</body>
</html>
